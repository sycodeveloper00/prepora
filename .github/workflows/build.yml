name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --target-platform android-arm64 --obfuscate --split-debug-info=build/debug-info
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prepora-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
