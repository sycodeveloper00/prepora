name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Android SDK platforms
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
          sdkmanager --licenses <<< "y" || true
      
      - name: Flutter Doctor
        run: flutter doctor -v
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Split APKs (per ABI)
        run: flutter build apk --split-per-abi --target-platform android-arm64,android-arm,android-x64 --verbose
      
      - name: Check APK sizes
        run: |
          echo "=== APK sizes ==="
          find build/app/outputs/flutter-apk -name "*.apk" -type f -exec ls -lh {} \;
          echo ""
          for apk in $(find build/app/outputs/flutter-apk -name "*.apk" -type f); do
            SIZE_KB=$(du -k "$apk" | cut -f1)
            SIZE_MB=$((SIZE_KB / 1024))
            BASENAME=$(basename "$apk")
            echo "$BASENAME: ${SIZE_MB}MB"
            if [ "$SIZE_KB" -gt 25600 ]; then
              echo "ERROR: $BASENAME exceeds 25MB!"
              exit 1
            fi
          done
          echo "All APKs under 25MB"
      
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: prepora-apks
          path: build/app/outputs/flutter-apk/*.apk
