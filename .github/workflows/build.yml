name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Android SDK platforms
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
          sdkmanager --licenses <<< "y" || true
      
      - name: Flutter Doctor
        run: flutter doctor -v
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --target-platform android-arm64 --verbose 2>&1 | tee build_log.txt
      
      - name: Show APK size
        if: success()
        run: |
          find build/app/outputs/flutter-apk -name "*.apk" -type f -exec ls -lh {} \; || true
          echo "Build output:"
          ls -la build/app/outputs/flutter-apk/ || true
      
      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build_log.txt
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prepora-apk
          path: build/app/outputs/flutter-apk/*.apk
