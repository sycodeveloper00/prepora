name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Android SDK platforms
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
          sdkmanager --licenses <<< "y" || true
      
      - name: Flutter Doctor
        run: flutter doctor -v
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --target-platform android-arm64 --verbose 2>&1 | tee build_log.txt
      
      - name: Find APK file
        id: find_apk
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK file found in build output!"
            echo "=== Build output directory ==="
            find build/app/outputs -type f 2>/dev/null
            echo "=== Last 100 lines of build log ==="
            tail -100 build_log.txt
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          ls -lh "$APK_PATH"
      
      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build_log.txt
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: prepora-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
