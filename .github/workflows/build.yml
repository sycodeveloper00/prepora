name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Android SDK platforms
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
          sdkmanager --licenses <<< "y" || true
      
      - name: Flutter Doctor
        run: flutter doctor -v
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        id: build_apk
        run: |
          flutter build apk --target-platform android-arm64 --no-tree-shake-icons 2>&1 | tee build_output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "build_exit=$BUILD_EXIT" >> $GITHUB_OUTPUT
          exit $BUILD_EXIT
      
      - name: Show build errors
        if: failure()
        run: |
          echo "=== LAST 100 LINES ==="
          tail -100 build_output.txt
          echo "=== GRADLE ERRORS ==="
          grep -i "error\|FAILURE\|FAILED\|exception" build_output.txt | tail -50 || true
      
      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-error-log
          path: build_output.txt
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: prepora-apk
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-release.apk
