name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Android SDK platforms
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
          sdkmanager --licenses <<< "y" || true
      
      - name: Flutter Doctor
        run: flutter doctor -v
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK (arm64 only)
        run: flutter build apk --target-platform android-arm64 --verbose
      
      - name: Check APK size
        run: |
          APK=$(find build/app/outputs/flutter-apk -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            find build/app/outputs -type f 2>/dev/null
            exit 1
          fi
          SIZE_KB=$(du -k "$APK" | cut -f1)
          SIZE_MB=$((SIZE_KB / 1024))
          echo "APK: $(basename $APK) = ${SIZE_MB}MB (${SIZE_KB}KB)"
          if [ "$SIZE_KB" -gt 25600 ]; then
            echo "WARNING: APK is ${SIZE_MB}MB (exceeds 25MB limit)"
          else
            echo "APK is under 25MB"
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
        id: apk_check
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: prepora-apk
          path: ${{ steps.apk_check.outputs.apk_path }}
